spring.application.name=campusconnect
spring.datasource.url=jdbc:mysql://localhost:3306/campusconnect
spring.datasource.username=root
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# Session reminder notification settings
app.notifications.session-reminder.enabled=true
app.notifications.session-reminder.lead-minutes=60
app.notifications.session-reminder.poll-ms=60000
app.notifications.session-reminder.from-address=

